@PART[kerbalEVA*]:HAS[@MODULE[KerbalEVA]]:FINAL
{
  MODULE 
  { 
	name = ModuleG3MagnetBoots 
	unlockTech = advExploration
  }

  MODULE
  { 
	name = ModuleG3NoAttach
  }

  // Inject
  // priority = 0 beats Dzhanibekov's default priority = 1, so it wins when both
  // situationMasks match. A Harmony patch on ValidEVASituation suppresses it
  // unless the kerbal is magnetically attached to a hull.
  @MODULE[ModuleScienceExperiment]:HAS[#experimentID[evaScience]]
  {
	EVASITUATION
	{
	  priority             = 0
	  situationMask        = 48
	  requiresNoAtmosphere = True
	  kerbalAction         = PlayGolf
	  resultString         = As you watch the golf ball veer off into space, you turn your earpiece back on to hear Mission Control losing their minds. You're not really sure why. Then, an orbit later, it hits you.
	}
  }
}
